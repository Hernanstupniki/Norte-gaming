services:
  db:
    image: postgres:16-alpine
    container_name: norte-gaming-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: norte_gaming
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${AUTHENTICATION_API_KEY}
      TZ: ${GENERIC_TIMEZONE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d norte_gaming"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: norte-gaming-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      TZ: ${GENERIC_TIMEZONE}
      DATABASE_URL: postgresql://postgres:${AUTHENTICATION_API_KEY}@db:5432/norte_gaming?schema=public
      CORS_ORIGIN: https://nortegaming.com
      FRONTEND_URL: https://nortegaming.com
      JWT_ACCESS_SECRET: ${AUTHENTICATION_API_KEY}
      JWT_REFRESH_SECRET: ${AUTHENTICATION_API_KEY}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      CONTACT_RECEIVER_EMAIL: ${CONTACT_RECEIVER_EMAIL}
    volumes:
      - ./uploads:/app/uploads
    command: sh -c "npx prisma migrate deploy; node dist/src/main.js"
    networks:
      - app
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.norte-api.rule=Host(`nortegaming.com`) && (PathPrefix(`/api`) || PathPrefix(`/docs`) || PathPrefix(`/uploads`))
      - traefik.http.routers.norte-api.entrypoints=web,websecure
      - traefik.http.routers.norte-api.tls=true
      - traefik.http.routers.norte-api.tls.certresolver=mytlschallenge
      - traefik.http.routers.norte-api.priority=100
      - traefik.http.services.norte-api.loadbalancer.server.port=4000

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://nortegaming.com/api
    container_name: norte-gaming-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://nortegaming.com/api
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.norte-web.rule=Host(`nortegaming.com`)
      - traefik.http.routers.norte-web.entrypoints=web,websecure
      - traefik.http.routers.norte-web.tls=true
      - traefik.http.routers.norte-web.tls.certresolver=mytlschallenge
      - traefik.http.routers.norte-web.priority=1
      - traefik.http.routers.norte-web-admin-api.rule=Host(`nortegaming.com`) && (Path(`/api/admin/session`) || PathPrefix(`/api/admin/proxy`))
      - traefik.http.routers.norte-web-admin-api.entrypoints=web,websecure
      - traefik.http.routers.norte-web-admin-api.tls=true
      - traefik.http.routers.norte-web-admin-api.tls.certresolver=mytlschallenge
      - traefik.http.routers.norte-web-admin-api.priority=300
      - traefik.http.services.norte-web.loadbalancer.server.port=3000

volumes:
  postgres_data:

networks:
  app:
    driver: bridge
  proxy:
    external: true
